<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tickets de Pedido — El Buen Pollo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --verde:     #4A6741;
  --verde-dim: #2E4228;
  --verde-18:  #4A674118;
  --verde-30:  #4A674130;
  --dorado:    #C8A84B;
  --dorado-18: #C8A84B18;
  --dorado-30: #C8A84B30;
  --crema:     #F2EDD7;
  --bg:        #F7F3E3;
  --bg2:       #EEE8D0;
  --bg3:       #E5DFC0;
  --texto:     #2A2416;
  --texto-dim: #7A6E50;
  --borde:     #D4CCAA;
  --rojo:      #8B2020;
  --rojo-bg:   #FFF0F0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--texto);
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ══ HEADER ══ */
.header {
  background: var(--verde-dim);
  border-bottom: 3px solid var(--dorado);
  padding: 14px 16px 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 8px #00000022;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-ico {
  width: 36px; height: 36px;
  background: var(--dorado);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.logo-txt .n {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700;
  color: var(--crema); line-height: 1.1; display: block;
}
.logo-txt .s {
  font-size: 10px; color: var(--dorado);
  letter-spacing: .12em; text-transform: uppercase; display: block; margin-top: 1px;
}
.btn-pegar {
  background: var(--dorado);
  color: var(--verde-dim);
  border: none; border-radius: 20px;
  padding: 9px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  white-space: nowrap;
  transition: opacity .2s;
}
.btn-pegar:hover { opacity: .85; }

/* FILTROS */
.filtros {
  display: flex; gap: 8px;
  overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
.filtros::-webkit-scrollbar { display: none; }
.f-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.8);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  padding: 5px 14px; border-radius: 16px;
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.f-btn.active {
  background: var(--dorado);
  color: var(--verde-dim);
  border-color: var(--dorado);
  font-weight: 700;
}

/* ══ STATS ══ */
.stats {
  display: flex;
  background: var(--crema);
  border-bottom: 2px solid var(--borde);
}
.stat {
  flex: 1; padding: 12px 8px;
  text-align: center;
  border-right: 1px solid var(--borde);
}
.stat:last-child { border-right: none; }
.stat .n {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 700;
  line-height: 1; display: block;
}
.stat .l {
  font-size: 10px; color: var(--texto-dim);
  letter-spacing: .06em; text-transform: uppercase;
  margin-top: 3px; display: block;
}
.stat.s-total .n     { color: var(--texto); }
.stat.s-pend .n      { color: var(--dorado); }
.stat.s-entr .n      { color: var(--verde); }

/* ══ LISTA ══ */
.lista { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

.empty {
  text-align: center; padding: 60px 20px; color: var(--texto-dim);
}
.empty .ico { font-size: 48px; opacity: .3; margin-bottom: 14px; display: block; }
.empty p { font-size: 14px; line-height: 1.7; }
.empty small { font-size: 12px; opacity: .6; display: block; margin-top: 6px; }

/* ══ TICKET ══ */
.ticket {
  background: white;
  border: 1.5px solid var(--borde);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px #2A241608;
  transition: box-shadow .2s;
}
.ticket.pendiente { border-left: 4px solid var(--dorado); }
.ticket.entregado { border-left: 4px solid var(--verde); opacity: .75; }
.ticket.cancelado { border-left: 4px solid var(--rojo); opacity: .6; }

.ticket-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 11px 14px 9px;
  border-bottom: 1px solid var(--borde);
  background: var(--bg);
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.ticket-folio {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700; color: var(--texto);
}
.ticket-meta {
  font-size: 11px; color: var(--texto-dim); margin-top: 2px;
}
.ticket-estado {
  font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 12px;
  white-space: nowrap; flex-shrink: 0;
}
.ticket-estado.pendiente { background: var(--dorado-18); color: #6B5300; border: 1px solid var(--dorado-30); }
.ticket-estado.entregado { background: var(--verde-18); color: var(--verde-dim); border: 1px solid var(--verde-30); }
.ticket-estado.cancelado { background: var(--rojo-bg); color: var(--rojo); border: 1px solid #FFCCCC; }

.ticket-chevron {
  color: var(--texto-dim); font-size: 16px;
  flex-shrink: 0; transition: transform .2s;
}
.ticket.expandido .ticket-chevron { transform: rotate(180deg); }

/* CUERPO DEL TICKET */
.ticket-body {
  display: none;
  padding: 12px 14px;
  border-bottom: 1px solid var(--borde);
}
.ticket.expandido .ticket-body { display: block; }

.ticket-texto {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 12px;
  color: var(--texto);
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg);
  border: 1px solid var(--borde);
  border-radius: 8px;
  padding: 12px 14px;
  max-height: 280px;
  overflow-y: auto;
}

/* ACCIONES */
.ticket-acciones {
  display: flex; gap: 8px;
  padding: 10px 14px 12px;
  background: var(--bg);
  flex-wrap: wrap;
}
.btn-ac {
  flex: 1; min-width: 90px; padding: 8px 10px;
  border-radius: 8px; border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .15s;
}
.btn-entregar { background: var(--verde-18); color: var(--verde-dim); border: 1px solid var(--verde-30); }
.btn-entregar:hover { background: var(--verde-30); }
.btn-reabrir  { background: var(--bg2); color: var(--texto-dim); border: 1px solid var(--borde); }
.btn-reabrir:hover { background: var(--bg3); }
.btn-cancelar { background: var(--rojo-bg); color: var(--rojo); border: 1px solid #FFCCCC; }
.btn-cancelar:hover { background: #FFCCCC; }
.btn-del { background: none; border: none; color: var(--borde); cursor: pointer; font-size: 18px; flex: 0; padding: 8px 4px; }
.btn-del:hover { color: var(--rojo); }

/* ══ PANEL EDICIÓN ══ */
.ticket-edit {
  display: none;
  padding: 14px;
  border-top: 1px dashed var(--borde);
  background: var(--bg);
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.ticket.editando .ticket-edit { display: block; }

.edit-section { margin-bottom: 14px; }
.edit-label {
  font-size: 10px; font-weight: 700;
  color: var(--texto-dim); letter-spacing: .12em;
  text-transform: uppercase; margin-bottom: 8px; display: block;
}

/* Productos editables */
.prod-edit-list { display: flex; flex-direction: column; gap: 5px; }
.prod-edit-row {
  display: flex; align-items: center; gap: 8px;
  background: white; border: 1px solid var(--borde);
  border-radius: 8px; padding: 8px 10px;
  font-size: 12.5px; color: var(--texto); transition: opacity .2s;
}
.prod-edit-row.tachado {
  opacity: .4; text-decoration: line-through;
}
.prod-edit-row span { flex: 1; line-height: 1.4; }
.btn-tachar {
  background: none; border: none;
  font-size: 16px; cursor: pointer; color: var(--borde);
  flex-shrink: 0; padding: 0; transition: color .15s;
}
.btn-tachar:hover { color: var(--rojo); }
.prod-edit-row.tachado .btn-tachar { color: var(--dorado); }

/* Chips rápidos */
.chips-row { display: flex; flex-wrap: wrap; gap: 7px; }
.chip-op {
  background: white; border: 1.5px solid var(--borde);
  border-radius: 20px; padding: 7px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--texto-dim); cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.chip-op:hover { border-color: var(--verde); background: var(--verde-18); color: var(--verde-dim); }
.chip-op.sel { background: var(--verde-18); border-color: var(--verde); color: var(--verde-dim); font-weight: 700; }
.chip-op.sel-dorado { background: var(--dorado-18); border-color: var(--dorado); color: #6B5300; font-weight: 700; }

/* Inputs del editor */
.edit-input {
  background: white; border: 1.5px solid var(--borde);
  border-radius: 10px; padding: 10px 13px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  color: var(--texto); outline: none; width: 100%;
  transition: border-color .2s;
}
.edit-input:focus { border-color: var(--verde); }
.edit-input::placeholder { color: #BBB; }
.edit-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.saldo-campo { display: none; }
.saldo-campo.visible { display: block; }

/* Resumen del ticket */
.ticket-resumen {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 14px;
  border-top: 1px solid var(--borde);
  background: var(--crema);
}
.resumen-chip {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 10px;
  display: flex; align-items: center; gap: 4px;
}
.rc-importe { background: var(--verde-18); color: var(--verde-dim); border: 1px solid var(--verde-30); }
.rc-entrega { background: var(--dorado-18); color: #6B5300; border: 1px solid var(--dorado-30); }
.rc-pagado  { background: var(--verde-18); color: var(--verde-dim); border: 1px solid var(--verde-30); }
.rc-saldo   { background: var(--rojo-bg); color: var(--rojo); border: 1px solid #FFCCCC; }

/* Botones del editor */
.edit-footer { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--borde); }
.btn-guardar-edit {
  flex: 1; background: var(--verde-dim); color: var(--crema);
  border: none; border-radius: 10px; padding: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 2px solid var(--dorado-30); transition: background .15s;
}
.btn-guardar-edit:hover { background: var(--verde); }
.btn-cancelar-edit {
  background: var(--bg2); border: 1.5px solid var(--borde);
  border-radius: 10px; padding: 12px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--texto-dim); cursor: pointer;
}

/* ══ MODAL PEGAR ══ */
.modal-bg {
  position: fixed; inset: 0;
  background: #2A241666;
  z-index: 200; display: none;
  align-items: flex-end;
}
.modal-bg.open { display: flex; }
.modal-sheet {
  background: white;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  animation: slideUp .3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-drag {
  width: 40px; height: 4px;
  background: var(--borde); border-radius: 2px;
  margin: 12px auto 0;
}
.modal-hdr {
  padding: 14px 18px;
  border-bottom: 1px solid var(--borde);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-hdr h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600;
}
.modal-hdr-close {
  background: none; border: none;
  font-size: 24px; cursor: pointer; color: var(--texto-dim);
}
.modal-body {
  flex: 1; overflow-y: auto;
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 12px;
}
.modal-instruccion {
  background: var(--verde-18);
  border: 1px solid var(--verde-30);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--verde-dim);
  line-height: 1.6;
}
.modal-instruccion strong { color: var(--verde-dim); }
.modal-textarea {
  background: var(--bg);
  border: 2px solid var(--borde);
  border-radius: 12px;
  padding: 14px;
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 13px;
  color: var(--texto);
  line-height: 1.7;
  resize: none;
  min-height: 200px;
  outline: none;
  transition: border-color .2s;
  width: 100%;
}
.modal-textarea:focus { border-color: var(--verde); background: white; }
.modal-textarea::placeholder { color: #BBB; font-family: 'DM Sans', sans-serif; font-size: 13px; }
.modal-preview {
  background: var(--bg2);
  border: 1px solid var(--borde);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--texto-dim);
  display: none;
}
.modal-preview.visible { display: block; }
.modal-preview .folio-detectado { color: var(--verde-dim); font-weight: 700; font-size: 13px; }
.modal-ftr {
  padding: 14px 18px;
  border-top: 1px solid var(--borde);
  display: flex; gap: 10px;
}
.btn-guardar-ticket {
  flex: 1;
  background: var(--verde-dim);
  color: var(--crema);
  border: none; border-radius: 10px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  border: 2px solid var(--dorado-30);
  transition: background .15s;
}
.btn-guardar-ticket:hover { background: var(--verde); }
.btn-guardar-ticket:disabled { opacity: .4; cursor: not-allowed; }
.btn-cancelar-modal {
  background: var(--bg2);
  border: 1.5px solid var(--borde);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--texto-dim);
  cursor: pointer;
}

/* ══ FAB ══ */
.fab {
  position: fixed; bottom: 24px; right: 18px;
  background: var(--verde-dim);
  border: 2px solid var(--dorado);
  color: var(--crema);
  border-radius: 28px; padding: 13px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 6px 20px #2E422840;
  transition: all .2s; z-index: 100;
}
.fab:hover { background: var(--verde); transform: translateY(-2px); }

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--verde-dim); color: var(--crema);
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500; opacity: 0;
  transition: all .3s; pointer-events: none; z-index: 300;
  white-space: nowrap; border: 1px solid var(--dorado-30);
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Badge nuevo */
.badge-nuevo {
  background: var(--rojo); color: white;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

@media(max-width:400px) {
  .ticket-folio { font-size: 13px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-ico">🐓</div>
      <div class="logo-txt">
        <span class="n">Tickets de Pedido</span>
        <span class="s">El Buen Pollo · Vendedor</span>
      </div>
    </div>
    <button class="btn-pegar" onclick="abrirModal()">
      📋 Pegar pedido
    </button>
  </div>
  <div class="filtros">
    <button class="f-btn active" onclick="filtrar('todos',this)">📋 Todos</button>
    <button class="f-btn" onclick="filtrar('pendiente',this)">⏳ Pendientes</button>
    <button class="f-btn" onclick="filtrar('entregado',this)">✅ Entregados</button>
    <button class="f-btn" onclick="filtrar('cancelado',this)">❌ Cancelados</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat s-total">
    <span class="n" id="stTotal">0</span>
    <span class="l">Total</span>
  </div>
  <div class="stat s-pend">
    <span class="n" id="stPend">0</span>
    <span class="l">Pendientes</span>
  </div>
  <div class="stat s-entr">
    <span class="n" id="stEntr">0</span>
    <span class="l">Entregados</span>
  </div>
</div>

<!-- LISTA -->
<div class="lista" id="listaTkts"></div>

<!-- FAB -->
<button class="fab" onclick="abrirModal()">📋 Pegar pedido</button>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="cerrarSiOverlay(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-drag"></div>
    <div class="modal-hdr">
      <h3>Pegar pedido de WhatsApp</h3>
      <button class="modal-hdr-close" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-instruccion">
        <strong>¿Cómo usarlo?</strong><br>
        1. En WhatsApp, mantén pulsado el mensaje del pedido<br>
        2. Toca <strong>Copiar</strong><br>
        3. Pégalo aquí abajo y toca <strong>Guardar ticket</strong>
      </div>
      <textarea
        class="modal-textarea"
        id="txtPegar"
        placeholder="Pega aquí el mensaje del pedido que llegó por WhatsApp..."
        oninput="onTextoChange(this.value)"
        rows="8"
      ></textarea>
      <div class="modal-preview" id="modalPreview">
        Detectado: <span class="folio-detectado" id="folioDetectado"></span>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-cancelar-modal" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar-ticket" id="btnGuardar" onclick="guardarTicket()" disabled>
        💾 Guardar ticket
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const STORE = 'buenpoll_tickets_v1';
let tickets = cargar();
let filtroActual = 'todos';

// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
function cargar() {
  try { return JSON.parse(localStorage.getItem(STORE) || '[]'); } catch(e) { return []; }
}
function guardar() {
  localStorage.setItem(STORE, JSON.stringify(tickets));
}

// ══════════════════════════════════════════
//  PARSEAR FOLIO Y FECHA DEL TEXTO PEGADO
// ══════════════════════════════════════════
function parsearTexto(txt) {
  // Buscar patrón de folio: BP + dígitos + PED + dígitos (ej: BP0107PED1432)
  // También acepta folios con guiones del formato anterior (BP-0107-1432)
  const folioMatch = txt.match(/BP[\w\-]+PED[\d]+|BP-[\d]+-[\d]+/i);
  const folio = folioMatch ? folioMatch[0].toUpperCase() : null;

  // Intentar extraer fecha del texto si viene en el mensaje
  const fechaMatch = txt.match(/(\d{2}\/\d{2}\/\d{4}[\s,]*\d{2}:\d{2})/);
  const fecha = fechaMatch
    ? fechaMatch[1]
    : new Date().toLocaleDateString('es-MX', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  return { folio, fecha };
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function abrirModal() {
  document.getElementById('txtPegar').value = '';
  document.getElementById('modalPreview').classList.remove('visible');
  document.getElementById('btnGuardar').disabled = true;
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('txtPegar').focus(), 300);
}

function cerrarModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function cerrarSiOverlay(e) {
  if (e.target === document.getElementById('modalBg')) cerrarModal();
}

function onTextoChange(txt) {
  const limpio = txt.trim();
  const { folio } = parsearTexto(limpio);
  const preview = document.getElementById('modalPreview');
  const btnG    = document.getElementById('btnGuardar');

  if (limpio.length > 10) {
    btnG.disabled = false;
    if (folio) {
      document.getElementById('folioDetectado').textContent = folio;
      preview.classList.add('visible');
    } else {
      preview.classList.remove('visible');
    }
  } else {
    btnG.disabled = true;
    preview.classList.remove('visible');
  }
}

function guardarTicket() {
  const txt = document.getElementById('txtPegar').value.trim();
  if (!txt) return;

  const { folio, fecha } = parsearTexto(txt);
  const folioFinal = folio || `TKT-${Date.now()}`;

  // Verificar duplicado
  if (folio && tickets.find(t => t.folio === folioFinal)) {
    toast(`ℹ️ El pedido ${folioFinal} ya está guardado`);
    cerrarModal();
    return;
  }

  tickets.push({
    id:     Date.now().toString(),
    folio:  folioFinal,
    fecha,
    texto:  txt,
    estado: 'pendiente',
    esNuevo: true,
  });

  guardar();
  cerrarModal();
  render();
  toast(`✅ Ticket ${folioFinal} guardado`);
}

// ══════════════════════════════════════════
//  ACCIONES
// ══════════════════════════════════════════
function cambiarEstado(id, estado) {
  const t = tickets.find(x=>x.id===id);
  if (!t) return;
  t.estado = estado;
  t.esNuevo = false;
  guardar(); render();
  const msgs = { entregado:'✅ Entregado', pendiente:'↩️ Reabierto', cancelado:'❌ Cancelado' };
  toast(msgs[estado] || 'Actualizado');
}

function eliminar(id) {
  if (!confirm('¿Eliminar este ticket?')) return;
  tickets = tickets.filter(t=>t.id!==id);
  guardar(); render();
  toast('🗑️ Ticket eliminado');
}

function toggleExpand(id) {
  const el = document.getElementById('tkt-'+id);
  if (el) {
    el.classList.toggle('expandido');
    // Marcar como visto
    const t = tickets.find(x=>x.id===id);
    if (t && t.esNuevo) { t.esNuevo = false; guardar(); render(); }
  }
}

function filtrar(estado, btn) {
  filtroActual = estado;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  // Stats
  document.getElementById('stTotal').textContent = tickets.length;
  document.getElementById('stPend').textContent  = tickets.filter(t=>t.estado==='pendiente').length;
  document.getElementById('stEntr').textContent  = tickets.filter(t=>t.estado==='entregado').length;

  const lista = filtroActual === 'todos'
    ? [...tickets].reverse()
    : [...tickets].filter(t=>t.estado===filtroActual).reverse();

  const cont = document.getElementById('listaTkts');

  if (!lista.length) {
    cont.innerHTML = `
      <div class="empty">
        <span class="ico">🐓</span>
        <p>${filtroActual==='todos'
          ? 'Aún no hay tickets guardados.<br>Toca <strong>"Pegar pedido"</strong> para agregar uno.'
          : 'No hay tickets en esta categoría.'}</p>
        <small>Copia el mensaje del pedido en WhatsApp y pégalo aquí.</small>
      </div>`;
    return;
  }

  const estadoLabel = { pendiente:'⏳ Pendiente', entregado:'✅ Entregado', cancelado:'❌ Cancelado' };

  cont.innerHTML = lista.map(t => {
    const acciones = t.estado === 'pendiente' ? `
      <button class="btn-ac btn-entregar" onclick="cambiarEstado('${t.id}','entregado')">✅ Entregado</button>
      <button class="btn-ac" style="background:var(--dorado-18);border:1px solid var(--dorado-30);color:#6B5300" onclick="toggleEditar('${t.id}')">✏️ Editar</button>
      <button class="btn-ac btn-cancelar" onclick="cambiarEstado('${t.id}','cancelado')">❌</button>
      <button class="btn-del" onclick="eliminar('${t.id}')">🗑️</button>
    ` : t.estado === 'entregado' ? `
      <button class="btn-ac btn-reabrir" onclick="cambiarEstado('${t.id}','pendiente')">↩️ Reabrir</button>
      <button class="btn-ac" style="background:var(--dorado-18);border:1px solid var(--dorado-30);color:#6B5300" onclick="toggleEditar('${t.id}')">✏️ Editar</button>
      <button class="btn-del" onclick="eliminar('${t.id}')">🗑️</button>
    ` : `
      <button class="btn-ac btn-reabrir" onclick="cambiarEstado('${t.id}','pendiente')">↩️ Reabrir</button>
      <button class="btn-del" onclick="eliminar('${t.id}')">🗑️</button>
    `;

    // Resumen si tiene datos editados
    const resumenHtml = renderResumen(t);

    // Panel de edición
    const editHtml = renderPanelEdicion(t);

    // Extracto primera línea
    const _lineas = t.texto.split('\n').filter(l=>l.trim());

    return `
      <div class="ticket ${t.estado}" id="tkt-${t.id}">
        <div class="ticket-header" onclick="toggleExpand('${t.id}')">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="ticket-folio">${t.folio}</span>
              ${t.esNuevo ? '<span class="badge-nuevo">NUEVO</span>' : ''}
            </div>
            <div class="ticket-meta">${t.fecha}</div>
          </div>
          <span class="ticket-estado ${t.estado}">${estadoLabel[t.estado]}</span>
          <span class="ticket-chevron">▾</span>
        </div>
        ${resumenHtml}
        <div class="ticket-body">
          <div class="ticket-texto">${escHtml(t.texto)}</div>
        </div>
        <div class="ticket-edit" id="edit-${t.id}">${editHtml}</div>
        <div class="ticket-acciones">${acciones}</div>
      </div>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
//  PARSEAR PRODUCTOS DEL TEXTO
// ══════════════════════════════════════════
function parsearProductos(texto) {
  return texto.split('\n')
    .map((linea, idx) => ({ idx, linea: linea.trim() }))
    .filter(({linea}) => linea.startsWith('•') || linea.startsWith('-'));
}

// ══════════════════════════════════════════
//  RENDER RESUMEN (chips bajo el header)
// ══════════════════════════════════════════
function renderResumen(t) {
  const chips = [];
  if (t.importe)  chips.push(`<span class="resumen-chip rc-importe">💰 $${Number(t.importe).toLocaleString('es-MX')}</span>`);
  if (t.entrega)  chips.push(`<span class="resumen-chip rc-entrega">🚚 ${t.entrega}</span>`);
  if (t.pago === 'pagado')
    chips.push(`<span class="resumen-chip rc-pagado">✅ Pagado</span>`);
  else if (t.pago === 'parcial' && t.saldo)
    chips.push(`<span class="resumen-chip rc-saldo">⚠️ Saldo $${Number(t.saldo).toLocaleString('es-MX')}</span>`);
  else if (t.pago === 'pendiente_pago')
    chips.push(`<span class="resumen-chip rc-saldo">💳 Pago pendiente</span>`);
  if (!chips.length) return '';
  return `<div class="ticket-resumen">${chips.join('')}</div>`;
}

// ══════════════════════════════════════════
//  RENDER PANEL DE EDICIÓN
// ══════════════════════════════════════════
function renderPanelEdicion(t) {
  const prods = parsearProductos(t.texto);
  const eliminados = t.productosEliminados || [];

  const prodsHtml = prods.length > 0 ? `
    <div class="edit-section">
      <span class="edit-label">Productos del pedido</span>
      <div class="prod-edit-list">
        ${prods.map(({idx, linea}) => {
          const tachado = eliminados.includes(idx);
          return `<div class="prod-edit-row${tachado?' tachado':''}" id="prow-${t.id}-${idx}">
            <span>${escHtml(linea.replace(/^[•\-]\s*/,''))}</span>
            <button class="btn-tachar" onclick="toggleProducto('${t.id}',${idx})" title="${tachado?'Restaurar':'Marcar como no surtido'}">${tachado?'↩️':'✕'}</button>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  const opEntrega = ['Uber Envíos','Transporte propio','Cliente recoge','Mensajería'];
  const entregaChips = opEntrega.map(op => `
    <button class="chip-op${t.entrega===op?' sel':''}" onclick="selChip('${t.id}','entrega','${op}',this)">${op}</button>
  `).join('');

  const opPago = [
    {v:'pagado',       l:'✅ Pagado completo'},
    {v:'parcial',      l:'⚠️ Saldo pendiente'},
    {v:'pendiente_pago', l:'💳 Por confirmar'},
  ];
  const pagoChips = opPago.map(op => `
    <button class="chip-op${t.pago===op.v?' sel-dorado':''}" onclick="selChip('${t.id}','pago','${op.v}',this)">${op.l}</button>
  `).join('');

  return `
    ${prodsHtml}
    <div class="edit-section">
      <span class="edit-label">Importe total del pedido</span>
      <input class="edit-input" type="number" id="ei-importe-${t.id}"
        placeholder="$ 0.00" value="${t.importe||''}"
        style="max-width:200px">
    </div>
    <div class="edit-section">
      <span class="edit-label">Tipo de entrega</span>
      <div class="chips-row">${entregaChips}</div>
    </div>
    <div class="edit-section">
      <span class="edit-label">Estado de pago</span>
      <div class="chips-row">${pagoChips}</div>
      <div class="saldo-campo${t.pago==='parcial'?' visible':''}" id="sc-${t.id}" style="margin-top:10px">
        <input class="edit-input" type="number" id="ei-saldo-${t.id}"
          placeholder="Monto del saldo pendiente $" value="${t.saldo||''}"
          style="max-width:220px">
      </div>
    </div>
    <div class="edit-section">
      <span class="edit-label">Observaciones</span>
      <input class="edit-input" type="text" id="ei-obs-${t.id}"
        placeholder="Ej. Entregar antes de las 5pm, empacar bien las velas..."
        value="${escHtml(t.observaciones||'')}">
    </div>
    <div class="edit-footer">
      <button class="btn-cancelar-edit" onclick="toggleEditar('${t.id}')">Cancelar</button>
      <button class="btn-guardar-edit" onclick="guardarEdicion('${t.id}')">💾 Guardar cambios</button>
    </div>`;
}

// ══════════════════════════════════════════
//  ACCIONES DE EDICIÓN
// ══════════════════════════════════════════
function toggleEditar(id) {
  const tkt = document.getElementById('tkt-'+id);
  if (!tkt) return;
  tkt.classList.toggle('editando');
  tkt.classList.toggle('expandido');
}

function toggleProducto(id, idx) {
  const t = tickets.find(x=>x.id===id);
  if (!t) return;
  if (!t.productosEliminados) t.productosEliminados = [];
  const pos = t.productosEliminados.indexOf(idx);
  if (pos === -1) t.productosEliminados.push(idx);
  else t.productosEliminados.splice(pos,1);
  // Actualizar solo la fila visualmente sin re-renderizar
  const row = document.getElementById(`prow-${id}-${idx}`);
  if (row) {
    const esTachado = t.productosEliminados.includes(idx);
    row.classList.toggle('tachado', esTachado);
    const btn = row.querySelector('.btn-tachar');
    if (btn) btn.textContent = esTachado ? '↩️' : '✕';
  }
  guardar();
}

function selChip(id, campo, valor, btn) {
  const t = tickets.find(x=>x.id===id);
  if (!t) return;
  t[campo] = valor;
  // Actualizar chips visualmente
  const clsSel = campo === 'pago' ? 'sel-dorado' : 'sel';
  btn.closest('.chips-row').querySelectorAll('.chip-op').forEach(c => {
    c.classList.remove('sel','sel-dorado');
  });
  btn.classList.add(clsSel);
  // Mostrar/ocultar campo de saldo
  if (campo === 'pago') {
    const sc = document.getElementById(`sc-${id}`);
    if (sc) sc.classList.toggle('visible', valor === 'parcial');
  }
  guardar();
}

function guardarEdicion(id) {
  const t = tickets.find(x=>x.id===id);
  if (!t) return;
  t.importe      = document.getElementById(`ei-importe-${id}`)?.value || null;
  t.saldo        = document.getElementById(`ei-saldo-${id}`)?.value   || null;
  t.observaciones= document.getElementById(`ei-obs-${id}`)?.value     || '';
  guardar();
  // Cerrar panel de edición y re-renderizar el ticket
  render();
  toast('✅ Cambios guardados');
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(()=>el.classList.remove('visible'), 2500);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
render();
</script>
</body>
</html>
